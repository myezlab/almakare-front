<svg width="1000" height="620" viewBox="0 0 1000 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGreen" x1="180" y1="80" x2="900" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2F9E44"/>
      <stop offset="100%" stop-color="#138A36"/>
    </linearGradient>

    <linearGradient id="leftBand" x1="0" y1="0" x2="260" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E5A11D"/>
      <stop offset="100%" stop-color="#D89212"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="980" height="600" rx="36" fill="url(#cardGreen)"/>

  <!-- Left yellow band -->
  <path d="M10 10H180L320 610H10V10Z" fill="url(#leftBand)"/>

  <!-- Decorative pattern -->
  <g opacity="0.12" stroke="#D6F5B0" stroke-width="3" stroke-linecap="round">
    <path d="M220 180C340 120 520 120 650 180"/>
    <path d="M210 220C350 160 540 160 690 230"/>
    <path d="M205 265C360 210 570 210 735 290"/>
    <path d="M215 320C390 270 610 280 770 360"/>
    <path d="M240 380C430 345 640 360 800 430"/>
  </g>

  <!-- Chip -->
  <g transform="translate(120 210)">
    <rect x="0" y="0" width="110" height="78" rx="14" fill="#C99963" stroke="#7A5737" stroke-width="2"/>
    <path d="M0 26H110M0 52H110M37 0V78M73 0V78" stroke="#7A5737" stroke-width="2"/>
    <path d="M0 13H37M73 13H110M0 65H37M73 65H110" stroke="#7A5737" stroke-width="2"/>
  </g>

  <!-- Photo placeholder -->
  <rect x="690" y="95" width="190" height="190" rx="8" fill="white" filter="url(#softGlow)"/>

  <!-- Title -->
  <text x="120" y="135" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" fill="#F3B32A">
    Vitale
  </text>
  <text x="290" y="190" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#F4F1E8">
    carte d’assurance maladie
  </text>

  <!-- Name -->
  <text x="290" y="430" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#111111">
    NOM
  </text>
  <text x="290" y="472" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#111111">
    Prénom
  </text>

  <!-- Number -->
  <text x="290" y="540" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#111111" letter-spacing="1">
    2 82 01 00 000 123 45
  </text>

  <!-- Small tactile dots -->
  <g fill="#C98C1A" opacity="0.9">
    <circle cx="118" cy="470" r="7"/>
    <circle cx="118" cy="497" r="7"/>
    <circle cx="118" cy="524" r="7"/>
    <circle cx="145" cy="538" r="7"/>
  </g>

  <!-- Small white chevron -->
  <path d="M52 553L92 538V550L64 566L92 582V594L52 579V553Z" fill="white" opacity="0.9"/>
</svg>